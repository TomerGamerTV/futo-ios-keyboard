name: Build sideloadable IPA

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Package FUTO Keyboard iOS
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest'

      - name: Generate Xcode Project
        run: |
          sudo gem install xcodeproj
          ruby generate_project.rb

      - name: Build Application for Sideloading
        run: |
          xcodebuild build \
            -project FUTOKeyboard.xcodeproj \
            -scheme FUTOKeyboard \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CONFIGURATION_BUILD_DIR=build/Release-iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package as sideloadable IPA
        run: |
          mkdir -p Payload
          cp -r build/Release-iphoneos/FUTOKeyboard.app Payload/
          zip -r FUTOKeyboard.ipa Payload
          echo "Sideloadable IPA packaged successfully at FUTOKeyboard.ipa"

      - name: Upload Sideloadable IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FUTOKeyboard-Sideloadable-IPA
          path: FUTOKeyboard.ipa
          if-no-files-found: error
